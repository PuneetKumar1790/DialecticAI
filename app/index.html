<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting to DialecticAI App</title>
  <meta http-equiv="refresh" content="0; url=http://localhost:5173" />
  <script>
    // Preserve query params from /app?q=... when redirecting to the Vite app.
    const target = `http://localhost:5173${window.location.search || ""}`;
    window.location.replace(target);
  </script>
</head>
<body>
  <p>Redirecting to <a href="http://localhost:5173">DialecticAI app</a>...</p>
</body>
</html>
