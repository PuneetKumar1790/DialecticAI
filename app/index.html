<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting to DialecticAI App</title>
  <meta http-equiv="refresh" content="0; url=/" />
  <script>
    // Local dev should go to Vite; production should go to deployed frontend.
    const APP_ORIGIN =
      window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1"
        ? "http://localhost:5173"
        : "https://dialectic-ai.vercel.app";

    // Preserve query params from /app?q=...
    const target = `${APP_ORIGIN}${window.location.search || ""}`;
    window.location.replace(target);
  </script>
</head>
<body>
  <p>Redirecting to <a href="https://dialectic-ai.vercel.app">DialecticAI app</a>...</p>
</body>
</html>
